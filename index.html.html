<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmileCraft Dental Clinic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Navigation -->
    <header>
        <div class="logo-container">
            <!-- Main Transparent Branding Logo -->
            <img src="Logo and Name.png" alt="SmileCraft Dental Clinic Logo" class="brand-logo">
        </div>
        <!-- Right-aligned Instant WhatsApp Appointment Link -->
        <a href="https://wa.me/919096891186?text=Hello%20SmileCraft%20Dental%20Clinic,%20I%20would%20like%20to%20book%20an%20appointment." target="_blank" class="cta-btn">
            Book Appointment
        </a>
    </header>

    <!-- Main Content Area -->
    <main>
        
        <!-- Hero & Showcase Gallery Section -->
        <section class="gallery-hero-section">
            <div class="gallery-grid">
                <div class="gallery-item large">
                    <img src="pexels-pavel-danilyuk-6812544.jpg" alt="Advanced Clinical Care">
                </div>
                <div class="gallery-item">
                    <img src="pexels-cedric-fauntleroy-4270374.jpg" alt="Digital Diagnostics">
                </div>
                <div class="gallery-item">
                    <img src="pexels-karola-g-6627706.jpg" alt="Aesthetic Shade Matching">
                </div>
            </div>
        </section>

        <!-- Doctor Profile Section -->
        <section class="doctor-section">
            <h2>Dr. Pooja Vijapure</h2>
            <div class="doctor-title">BDS, MDS</div>
            <div class="doctor-edu">(Conservative Dentistry and Endodontist)</div>
            <div class="doctor-edu" style="margin-top: 6px; font-size: 0.85rem; letter-spacing: 0.05em;">MUHS</div>
        </section>

        <!-- Specialized Technical Showcase -->
        <section class="clinical-showcase">
            <h3>Clinical Standards & Equipment</h3>
            <div class="showcase-grid">
                <div class="showcase-card">
                    <img src="pexels-nadezhda-moryak-7800681.jpg" alt="Modern Diagnostics">
                </div>
                <div class="showcase-card">
                    <img src="pexels-gustavo-fring-4971514.jpg" alt="Patient Education">
                </div>
                <div class="showcase-card">
                    <img src="pexels-numangilgil-10820367.jpg" alt="Precision Instruments">
                </div>
            </div>
        </section>

        <!-- Location Section -->
        <section class="location-section">
            <h3>Find Our Clinic</h3>
            <div class="map-wrapper">
                <!-- Embedded Google Maps interface -->
                <iframe src="https://maps.app.goo.gl/N3oV4QsmvRjTZHkK8?g_st=ic" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

    </main>

    <!-- Footer Area -->
    <footer>
        <!-- Instagram Link -->
        <a href="https://www.instagram.com/smilecraft_dental_clinic_pune?igsh=MTRoaHo5cnEyejU1dQ%3D%3D&utm_source=qr" target="_blank" class="social-link">
